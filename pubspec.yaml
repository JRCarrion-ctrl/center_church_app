name: ccf_app
description: "This app was created for the purposes of the Center Church Frederick / Centro Cristiano Frederick to connect with their community, stay up to date on church events, and access church resources."

publish_to: 'none'

version: 1.2.4+12

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.1.1
  cupertino_icons: ^1.0.8
  table_calendar: ^3.2.0
  go_router: ^17.1.0
  provider: ^6.1.5+1
  app_links: ^6.4.0
  logger: ^2.6.2
  http: ^1.6.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.2.2
  intl: ^0.20.0
  uuid: ^4.5.2
  file_picker: ^10.3.6
  image_picker: ^1.2.1
  path: ^1.9.1
  path_provider: ^2.1.5
  youtube_player_flutter: ^9.1.3
  omni_video_player: ^4.0.0-beta
  flutter_image_compress: ^2.4.0
  cached_network_image: ^3.4.1
  share_plus: ^12.0.1
  image_gallery_saver_plus: ^4.0.1
  add_2_calendar: ^3.0.1
  flutter_appauth: ^11.0.0
  flutter_linkify: ^6.0.0
  flutter_link_previewer: ^4.2.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_timezone_latest: ^1.0.0
  mobile_scanner: ^7.1.3
  dio: ^5.9.0
  open_filex: ^4.7.0
  syncfusion_flutter_pdfviewer: ^32.2.8
  webview_flutter: ^4.13.1
  package_info_plus: ^9.0.0
  onesignal_flutter: ^5.3.4
  permission_handler: ^12.0.1
  easy_localization: ^3.0.8
  flutter_localizations:
    sdk: flutter
  connectivity_plus: ^6.1.5
  graphql_flutter: ^5.2.1
  gql: ^1.0.1
  flutter_secure_storage: ^10.0.0
  jwt_decoder: ^2.0.1
  font_awesome_flutter: ^10.12.0
  flutter_native_splash: ^2.4.7
  app_tracking_transparency: ^2.0.6+1
  syncfusion_flutter_calendar: ^32.1.23
  flutter_riverpod: ^3.2.1
  media_kit: ^1.2.6
  flutter_web_auth_2: ^5.0.1
  openid_client: ^0.4.9+2
  qr_flutter: ^4.1.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/CCF_Logo_Black.png"
  
  android: true

  ios: true

  web: true

  android_12:
    image: "assets/CCF_Logo_Black.png"
    color: "#FFFFFF"
    icon_background_color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/logo_dark.png
    - assets/logo_light.png
    - assets/logo_image.png
    - assets/landing_background.png
    - assets/image_placeholder.png
    - assets/DSC06378.jpg
    - assets/landing_v2.png
    - assets/landing_v2_blurred.png
    - assets/landing_v2_blurred_2.png