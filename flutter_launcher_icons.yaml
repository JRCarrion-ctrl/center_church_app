flutter_launcher_icons:
  # General Default
  image_path: "assets/CCF_Logo_Black.png" 

  # Android Configuration
  android: "launcher_icon"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  # Use the black logo as the foreground for the adaptive icon
  adaptive_icon_foreground: "assets/CCF_Logo_Black.png"
  # Inset handles the safe zone so the logo isn't cut off by the mask
  adaptive_icon_foreground_inset: 16
  # Use the white logo for Android 13+ themed/monochrome icons
  adaptive_icon_monochrome: "assets/CCF_Logo_White.png"

  # iOS Configuration
  ios: true
  remove_alpha_ios: true
  # Light mode: Black logo on white (default)
  image_path_ios: "assets/CCF_Logo_Black.png"
  # Dark mode: White logo on transparent/dark background
  image_path_ios_dark_transparent: "assets/CCF_Logo_White.png"
  # Tinted mode (iOS 18): Use the white logo for grayscale mapping
  image_path_ios_tinted_grayscale: "assets/CCF_Logo_White.png"
  desaturate_tinted_to_grayscale_ios: true
  background_color_ios: "#FFFFFF"

  # Web Configuration
  web:
    generate: true
    image_path: "assets/CCF_Logo_Black.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"

  # Desktop Configuration
  windows:
    generate: true
    image_path: "assets/CCF_Logo_Black.png"
    icon_size: 256 # Higher resolution is better for Windows taskbars

  macos:
    generate: true
    image_path: "assets/CCF_Logo_Black.png"